name: Publish to npm

# Publishes the package to the npm registry. This is fully GitHub-driven: you
# create a Release in GitHub and this workflow does the rest — derive the
# version from the release tag, build, and publish. You never run npm version
# or npm publish locally.
#
#   GitHub UI: Releases -> "Draft a new release" -> set tag vX.Y.Z -> Publish.
#   (or `gh release create vX.Y.Z --generate-notes`, or `make release`.)
#
# You can also trigger it manually from the Actions tab (workflow_dispatch),
# passing the version explicitly.
#
# One-time setup (see .github/workflows/README.md):
#   1. Create an npm "Automation" access token with publish rights.
#   2. Add it to this repo as a secret named NPM_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, e.g. 1.2.3 (no leading "v").
        required: true

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # The release tag (e.g. v1.2.3) is the source of truth for the version.
      # For manual runs, take it from the workflow_dispatch input instead.
      - name: Resolve version from release tag
        id: ver
        run: |
          RAW="${{ github.event.release.tag_name }}"
          [ -n "$RAW" ] || RAW="${{ github.event.inputs.version }}"
          VERSION="${RAW#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
            echo "::error::Could not resolve a valid semver version (got '$RAW')."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Stamp package.json with the release version (in the runner only — not
      # committed back), so the published package matches the tag exactly.
      - name: Set package version
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
